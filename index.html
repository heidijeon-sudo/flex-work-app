<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유연근무 스케줄러</title>
  <meta name="description" content="출퇴근 시간을 기록하고 주간 근무 규칙 충족 여부를 자동으로 확인하는 유연근무 스케줄링 도구입니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-wrapper">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="header-left">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <circle cx="14" cy="14" r="12" stroke="url(#grad1)" stroke-width="2.5" />
              <path d="M14 7v7l4.5 4.5" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" />
              <defs>
                <linearGradient id="grad1" x1="2" y1="2" x2="26" y2="26" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#6C63FF" />
                  <stop offset="1" stop-color="#48CFAD" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div>
            <h1 class="app-title">유연근무 스케줄러</h1>
            <p class="app-subtitle" id="weekLabel">이번 주 근무 현황</p>
          </div>
          <div class="made-by">Made by <strong>HEIDI</strong></div>
        </div>
        <div class="header-right">
          <div class="week-nav">
            <button class="nav-btn" id="prevWeekBtn" title="이전 주">&#8249;</button>
            <span class="week-display" id="weekDisplay">로딩중...</span>
            <button class="nav-btn" id="nextWeekBtn" title="다음 주">&#8250;</button>
          </div>
          <button class="reset-btn" id="resetBtn" title="데이터 초기화">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
              <path d="M3 3v5h5" />
            </svg>
            초기화
          </button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <!-- Summary Cards (Screen 2) -->
      <section class="summary-section">
        <div class="summary-grid">
          <div class="summary-card" id="card-total">
            <div class="card-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 6v6l4 2" />
              </svg>
            </div>
            <div class="card-body">
              <div class="card-label">총 실 근무시간</div>
              <div class="card-value" id="totalActual">0시간 0분</div>
            </div>
            <div class="card-badge" id="badge-total">—</div>
          </div>

          <div class="summary-card" id="card-remain">
            <div class="card-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <path
                  d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
              </svg>
            </div>
            <div class="card-body">
              <div class="card-label">남은 근무시간</div>
              <div class="card-value" id="remainHours">40시간 0분</div>
            </div>
            <div class="card-badge" id="badge-remain">—</div>
          </div>

          <div class="summary-card" id="card-short">
            <div class="card-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <rect x="3" y="4" width="18" height="18" rx="2" />
                <path d="M16 2v4M8 2v4M3 10h18" />
              </svg>
            </div>
            <div class="card-body">
              <div class="card-label">6시간 미만 근무일</div>
              <div class="card-value" id="shortDayStatus">없음</div>
            </div>
            <div class="card-badge" id="badge-short">—</div>
          </div>

          <div class="summary-card" id="card-rule">
            <div class="card-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <path d="M9 12l2 2 4-4" />
                <path d="M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9c1.66 0 3.22.45 4.56 1.24" />
              </svg>
            </div>
            <div class="card-body">
              <div class="card-label">단축근무 조건</div>
              <div class="card-value" id="ruleStatus">미충족</div>
            </div>
            <div class="card-badge" id="badge-rule">—</div>
          </div>
        </div>
      </section>

      <!-- Progress Bar -->
      <section class="progress-section">
        <div class="progress-header">
          <span class="progress-label">주간 진행률</span>
          <span class="progress-percent" id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
          <div class="progress-target-line" style="left: 100%" title="목표: 40시간"></div>
        </div>
        <div class="progress-info">
          <span>0h</span>
          <span>10h</span>
          <span>20h</span>
          <span>30h</span>
          <span>40h</span>
        </div>
      </section>

      <!-- Schedule Table (Screen 1) -->
      <section class="schedule-section">
        <div class="section-header">
          <h2 class="section-title">주간 근무 입력</h2>
          <div class="section-hint">출퇴근 시간을 입력하면 자동으로 계산됩니다</div>
        </div>
        <div class="table-wrapper">
          <table class="schedule-table" id="scheduleTable">
            <thead>
              <tr>
                <th class="col-date">날짜</th>
                <th class="col-time">출근시간</th>
                <th class="col-time">퇴근시간</th>
                <th class="col-calc">총 근무시간</th>
                <th class="col-calc">휴게시간</th>
                <th class="col-actual">실 근무시간</th>
                <th class="col-est">예상 퇴근</th>
                <th class="col-holiday">공휴일</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <!-- rows injected by JS -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- Suggestion Section -->
      <section class="suggestion-section" id="suggestionSection">
        <div class="suggestion-header">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          남은 요일 필요 근무시간
        </div>
        <div class="suggestion-body" id="suggestionBody">
          —
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
